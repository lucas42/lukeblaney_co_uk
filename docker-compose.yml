services:
  lukeblaney_co_uk:
    build: .
    container_name: lukeblaney_co_uk
    ports:
      - $PORT:80
    image: lucas42/lukeblaney_co_uk:${VERSION:-latest}
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
