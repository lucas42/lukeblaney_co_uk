version: 2.1
orbs:
  lucos: lucos/deploy@0

jobs:
  check-links:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - run:
          name: Build Docker image
          command: docker build -t site-under-test .
      - run:
          name: Start site container
          command: docker run -d -p 8080:80 --name site site-under-test
      - run:
          name: Wait for site to be ready
          command: timeout 30 bash -c 'until curl -sf http://localhost:8080/; do sleep 1; done'
      - run:
          name: Check internal links
          command: |
            # Install into an explicit venv and invoke by absolute path. Don't
            # rely on `linkchecker` resolving on PATH: the machine image's python
            # layout is not stable across `ubuntu-2204:current`, and a pip-installed
            # console script that isn't on PATH fails with a bare exit 127.
            python3 -m venv /tmp/linkchecker-venv
            /tmp/linkchecker-venv/bin/pip install --quiet linkchecker
            /tmp/linkchecker-venv/bin/linkchecker --no-status --no-warnings http://localhost:8080/

workflows:
  version: 2
  build-deploy:
    jobs:
      - lucos/build:
          serial-group: << pipeline.project.slug >>/build/<< pipeline.git.branch >>
      - check-links
      - lucos/deploy-avalon:
          serial-group: deploy-avalon
          requires:
            - lucos/build
            - check-links
          filters:
            branches:
              only:
                - main
